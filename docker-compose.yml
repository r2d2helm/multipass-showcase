name: multipass-showcase

services:
  showcase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multipass-showcase
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DATA_MODE: ${DATA_MODE:-fake}
      NODE_ENV: production
    logging:
      driver: journald
      options:
        tag: docker/{{.Name}}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3005/api/health',r=>{process.exit(r.statusCode===200?0:1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
